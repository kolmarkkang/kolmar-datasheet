<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>샘플링 packing data sheet</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
  body { font-family: system-ui, -apple-system, sans-serif; }
  table { border-collapse: collapse; width: 100%; }
  th, td { border: 1px solid #e5e7eb; }
  .sticky-header th { position: sticky; top: 0; background: white; z-index: 10; }

  /* No, 체크, packing No 는 좁게 유지 */
  .col-no {
    width: 28px !important;
    min-width: 28px !important;
    max-width: 28px !important;
  }
  .col-check {
    width: 52px !important;
    min-width: 52px !important;
  }
  .col-num {
    width: 58px !important;
    min-width: 58px !important;
  }

  /* 자재번호 + 배치번호 완전 균등 */
  .col-equal {
    min-width: 110px;
    width: 50%;
  }

  .batch-input, .mat-input {
    font-size: 12px;
  }
</style>
</head>
<body class="bg-gray-50">
<div class="max-w-6xl mx-auto p-3 sm:p-5">

  <!-- 헤더 -->
  <div class="mb-4">
    <h1 class="text-xl sm:text-2xl font-bold text-teal-700">📋 샘플링 packing data sheet</h1>
    <p class="text-gray-600 text-xs sm:text-sm mt-1">컴퓨터에서 입력 → QR로 폰에 전송 → Import로 사용</p>
  </div>

  <!-- 안내 -->
  <div class="bg-white border border-gray-200 rounded-xl p-3 mb-4 shadow-sm text-xs sm:text-sm">
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-2">
      <div><span class="font-semibold text-blue-600">1.</span> 엑셀 업로드 (A=자재번호, B=배치번호)</div>
      <div><span class="font-semibold text-blue-600">2.</span> QR 내보내기</div>
      <div><span class="font-semibold text-blue-600">3.</span> 폰에서 Import</div>
    </div>
  </div>

  <!-- 테이블 -->
  <div class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden mb-4">
    <div class="px-3 py-2.5 border-b flex items-center justify-between bg-gray-50">
      <div class="font-semibold text-sm">데이터 입력 (100줄)</div>
      <div class="flex gap-1.5">
        <button onclick="saveToLocal()" class="px-2.5 py-1 bg-white border border-gray-300 text-xs rounded-lg">💾 저장</button>
        <button onclick="loadFromLocal()" class="px-2.5 py-1 bg-white border border-gray-300 text-xs rounded-lg">📂 불러오기</button>
        <button onclick="clearAll()" class="px-2.5 py-1 bg-white border border-red-200 text-red-600 text-xs rounded-lg">초기화</button>
      </div>
    </div>

    <div class="overflow-x-auto max-h-[58vh]">
      <table class="w-full text-xs">
        <thead class="sticky-header bg-white">
          <tr class="text-gray-600">
            <th class="col-no px-0.5 py-2 font-medium text-center">No</th>
            <th class="col-equal px-1.5 py-2 font-medium">자재번호</th>
            <th class="col-equal px-1.5 py-2 font-medium">배치번호</th>
            <th class="col-check px-0.5 py-2 font-medium text-center">1번 packing</th>
            <th class="col-num px-1 py-2 font-medium text-right">packing No</th>
          </tr>
        </thead>
        <tbody id="data-tbody" class="divide-y"></tbody>
      </table>
    </div>
  </div>

  <!-- 버튼 -->
  <div class="flex flex-wrap gap-2 mb-4">
    <button onclick="uploadExcelFile()" 
            class="px-4 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl text-sm">
      📄 엑셀 업로드
    </button>

    <button onclick="generateQRCode()" 
            class="flex-1 min-w-[140px] px-4 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-xl text-sm">
      📱 QR 코드로 내보내기
    </button>
    
    <button onclick="downloadCSV()" 
            class="px-4 py-2.5 bg-white border border-gray-300 font-medium rounded-xl text-sm">
      📄 CSV 다운로드
    </button>
  </div>

  <!-- Import -->
  <div class="bg-white border border-gray-200 rounded-xl p-3 shadow-sm">
    <div class="font-semibold mb-2 text-sm">📥 폰에서 QR 스캔 후 여기 붙여넣기</div>
    <textarea id="import-textarea" rows="3" placeholder="QR 스캔 결과 붙여넣기" 
              class="w-full border border-gray-300 rounded-lg p-2.5 text-xs font-mono focus:outline-none focus:border-emerald-400"></textarea>
    <button onclick="importFromText()" 
            class="mt-2 w-full sm:w-auto px-5 py-2 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-lg text-sm">
      데이터 가져오기 (Import)
    </button>
  </div>

</div>

<input type="file" id="excel-upload" accept=".xlsx,.xls,.csv" class="hidden" onchange="handleExcelUpload(event)">

<!-- QR 모달 -->
<div id="qr-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4">
  <div class="bg-white rounded-2xl max-w-sm w-full p-4 shadow-xl">
    <div class="flex justify-between items-center mb-3">
      <div class="font-bold">폰으로 스캔하세요</div>
      <button onclick="closeQRModal()" class="text-xl text-gray-400">×</button>
    </div>
    
    <div id="qr-container" class="flex justify-center p-2 bg-white rounded-xl border"></div>
    
    <div class="mt-3 text-xs text-center text-gray-600">
      1. 폰 카메라로 QR 스캔<br>
      2. 텍스트 <strong>전체 복사</strong><br>
      3. Import에 붙여넣기
    </div>
    
    <div class="flex gap-2 mt-4">
      <button onclick="downloadQRImage()" class="flex-1 py-2 border border-gray-300 rounded-lg text-sm">QR 저장</button>
      <button onclick="closeQRModal()" class="flex-1 py-2 bg-emerald-600 text-white rounded-lg text-sm font-semibold">닫기</button>
    </div>
  </div>
</div>

<script>
function generateTable() {
  const tbody = document.getElementById('data-tbody');
  tbody.innerHTML = '';
  for (let i = 1; i <= 100; i++) {
    const row = document.createElement('tr');
    row.className = 'hover:bg-gray-50';
    row.innerHTML = `
      <td class="col-no px-0.5 py-1.5 text-center font-mono text-gray-500">${i}</td>
      <td class="col-equal px-1 py-1">
        <input type="text" id="mat-${i}" placeholder="자재번호" 
               class="mat-input w-full border border-gray-200 rounded px-1.5 py-1 outline-none focus:border-emerald-400">
      </td>
      <td class="col-equal px-1 py-1">
        <input type="text" id="batch-${i}" placeholder="배치번호" 
               class="batch-input w-full border border-gray-200 rounded px-1.5 py-1 outline-none focus:border-emerald-400">
      </td>
      <td class="col-check px-0.5 py-1.5 text-center">
        <input type="checkbox" id="check-${i}" class="w-4 h-4 accent-emerald-600">
      </td>
      <td class="col-num px-0.5 py-1">
        <input type="number" id="num-${i}" value="0" 
               class="w-full border border-gray-200 rounded px-1 py-1 text-right outline-none focus:border-emerald-400">
      </td>
    `;
    tbody.appendChild(row);
  }
}

// 엑셀 업로드
function uploadExcelFile() {
  document.getElementById('excel-upload').click();
}

function handleExcelUpload(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = new Uint8Array(ev.target.result);
      const workbook = XLSX.read(data, { type: 'array' });
      const worksheet = workbook.Sheets[workbook.SheetNames[0]];
      const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: '' });

      const parsed = [];
      jsonData.forEach((row, idx) => {
        if (idx === 0) {
          const first = String(row[0] || '').toLowerCase();
          if (first.includes('자재') || first.includes('mat') || first === 'no' || first === '번호') return;
        }
        const mat = String(row[0] || '').trim();
        const batch = String(row[1] || '').trim();
        if (mat || batch) parsed.push([mat, batch]);
      });

      if (parsed.length === 0) {
        alert('인식된 데이터가 없습니다.\nA열=자재번호, B열=배치번호로 확인해주세요.');
        return;
      }

      importData(parsed);
      alert(parsed.length + '개 행을 불러왔습니다!');
    } catch (err) {
      alert('엑셀 파일을 읽는 중 오류가 발생했습니다.');
    }
  };
  reader.readAsArrayBuffer(file);
  e.target.value = '';
}

// QR 내보내기
function generateQRCode() {
  const pairs = [];
  for (let i = 1; i <= 100; i++) {
    const mat = document.getElementById(`mat-${i}`).value.trim();
    const batch = document.getElementById(`batch-${i}`).value.trim();
    if (mat || batch) pairs.push(mat + "," + batch);
  }

  if (pairs.length === 0) {
    alert('입력된 데이터가 없습니다.');
    return;
  }

  const textStr = pairs.join("|");

  if (textStr.length > 2800) {
    alert('데이터가 너무 많습니다 (' + pairs.length + '개).\n항목 수를 줄여주세요.');
    return;
  }

  const modal = document.getElementById('qr-modal');
  const container = document.getElementById('qr-container');
  container.innerHTML = '';

  try {
    new QRCode(container, {
      text: textStr,
      width: 240,
      height: 240,
      colorDark: "#111827",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.L
    });
    modal.classList.remove('hidden');
    modal.classList.add('flex');
  } catch(e) {
    alert('QR 생성 실패. 데이터가 너무 많습니다.');
  }
}

function closeQRModal() {
  document.getElementById('qr-modal').classList.add('hidden');
  document.getElementById('qr-modal').classList.remove('flex');
}

function downloadQRImage() {
  const canvas = document.querySelector('#qr-container canvas');
  if (canvas) {
    const link = document.createElement('a');
    link.download = 'packing-qr.png';
    link.href = canvas.toDataURL();
    link.click();
  }
}

// 데이터 가져오기
function importData(data) {
  if (typeof data === 'string') {
    data = data.trim();
    if (data.includes('|')) {
      data = data.split('|').map(item => {
        const p = item.split(',');
        return [p[0] || '', p[1] || ''];
      });
    } else if (data.includes('\n')) {
      data = data.split('\n').filter(l => l.trim()).map(line => {
        const p = line.split(',');
        return [p[0] || '', p[1] || ''];
      });
    } else if (data.startsWith('[')) {
      try { data = JSON.parse(data); } catch(e) { alert('형식 오류'); return; }
    } else {
      const p = data.split(',');
      data = [[p[0] || '', p[1] || '']];
    }
  }

  if (!Array.isArray(data) || data.length === 0) {
    alert('불러올 데이터가 없습니다.');
    return;
  }

  for (let i = 0; i < Math.min(100, data.length); i++) {
    let mat = '', batch = '';
    if (Array.isArray(data[i])) {
      mat = data[i][0] || '';
      batch = data[i][1] || '';
    } else {
      mat = String(data[i] || '');
    }
    const matInput = document.getElementById(`mat-${i+1}`);
    const batchInput = document.getElementById(`batch-${i+1}`);
    if (matInput) matInput.value = mat;
    if (batchInput) batchInput.value = batch;
  }
  alert(data.length + '개 행을 불러왔습니다!');
}

function saveToLocal() {
  const data = [];
  for (let i = 1; i <= 100; i++) {
    data.push([
      document.getElementById(`mat-${i}`).value.trim(),
      document.getElementById(`batch-${i}`).value.trim(),
      document.getElementById(`check-${i}`).checked ? 1 : 0,
      parseFloat(document.getElementById(`num-${i}`).value) || 0
    ]);
  }
  localStorage.setItem('companyDataBoard_v1', JSON.stringify(data));
  alert('저장되었습니다.');
}

function loadFromLocal() {
  const saved = localStorage.getItem('companyDataBoard_v1');
  if (!saved) return alert('저장된 데이터가 없습니다.');
  try {
    importData(JSON.parse(saved));
  } catch(e) {
    alert('불러오기 실패');
  }
}

function clearAll() {
  if (!confirm('초기화할까요?')) return;
  for (let i = 1; i <= 100; i++) {
    document.getElementById(`mat-${i}`).value = '';
    document.getElementById(`batch-${i}`).value = '';
    document.getElementById(`check-${i}`).checked = false;
    document.getElementById(`num-${i}`).value = 0;
  }
}

// ==================== CSV 내보내기 (요청한 헤더 정확히 적용) ====================
function downloadCSV() {
  // A1=No, B1=자재번호, C1=배치번호, D1=1번 packing, E1=packing No
  // 데이터는 2행부터 시작
  let csv = 'No,자재번호,배치번호,1번 packing,packing No\n';
  
  for (let i = 1; i <= 100; i++) {
    const mat = document.getElementById(`mat-${i}`).value.trim();
    const batch = document.getElementById(`batch-${i}`).value.trim();
    const checked = document.getElementById(`check-${i}`).checked ? 1 : 0;
    const num = document.getElementById(`num-${i}`).value || 0;
    
    // 데이터 행 (A2부터)
    csv += `${i},"${mat.replace(/"/g, '""')}","${batch.replace(/"/g, '""')}",${checked},${num}\n`;
  }

  // 한글 깨짐 방지
  const bom = '\uFEFF';
  const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
  
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'packing_data.csv';
  link.click();
  URL.revokeObjectURL(link.href);
}

function importFromText() {
  const text = document.getElementById('import-textarea').value.trim();
  if (!text) return alert('내용이 없습니다.');
  importData(text);
  document.getElementById('import-textarea').value = '';
}

function init() {
  generateTable();

  const saved = localStorage.getItem('companyDataBoard_v1');
  if (saved) {
    try {
      importData(JSON.parse(saved));
    } catch(e) {}
  }

  // 자동 저장
  let timer;
  document.getElementById('data-tbody').addEventListener('input', () => {
    clearTimeout(timer);
    timer = setTimeout(() => {
      const d = [];
      for (let i = 1; i <= 100; i++) {
        d.push([
          document.getElementById(`mat-${i}`).value.trim(),
          document.getElementById(`batch-${i}`).value.trim(),
          document.getElementById(`check-${i}`).checked ? 1 : 0,
          parseFloat(document.getElementById(`num-${i}`).value) || 0
        ]);
      }
      localStorage.setItem('companyDataBoard_v1', JSON.stringify(d));
    }, 600);
  });
}

window.onload = init;
</script>
</body>
</html>
