<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOLMAR | 데이터 입력 시트</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&amp;display=swap');
  body { font-family: 'Noto Sans KR', system-ui, sans-serif; }
  .data-table td, .data-table th { padding: 5px 8px; }
  .data-table th { font-weight: 600; color: #334155; background-color: #f8fafc; }
  .row-hover:hover { background-color: #f0f9ff; }
  input[type="text"], input[type="number"] { 
    border: none; outline: none; background: transparent; width: 100%; padding: 3px 6px; font-size: 14px;
  }
  input[type="text"]:focus, input[type="number"]:focus { 
    outline: 2px solid #276EF1; outline-offset: -2px; background: white; border-radius: 4px;
  }
  @media (max-width: 640px) {
    .data-table td, .data-table th { padding: 4px 6px; font-size: 13px; }
    input[type="text"], input[type="number"] { font-size: 13px; padding: 2px 4px; }
  }
</style>
</head>
<body class="bg-slate-50">
  <nav class="bg-[#276EF1] text-white shadow-lg">
    <div class="max-w-screen-xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="w-9 h-9 bg-white rounded-xl flex items-center justify-center shadow">
          <span class="text-[#276EF1] font-black text-2xl tracking-tighter">K</span>
        </div>
        <div>
          <div class="font-bold text-xl tracking-tight">KOLMAR</div>
        </div>
      </div>
      <div class="text-xs text-blue-100">데이터 입력 시스템</div>
    </div>
  </nav>

  <div class="max-w-screen-xl mx-auto px-4 py-4">
    <div class="mb-3 p-3 bg-white rounded-2xl shadow-sm border border-slate-100 text-sm text-slate-600">
      💡 컴퓨터에서 입력 후 CSV로 내보내서 폰으로 공유하세요. (실시간 동기화는 안 됩니다)
    </div>

    <!-- 툴바 -->
    <div class="flex flex-wrap items-center gap-2 mb-3">
      <button onclick="addRows(10)" 
              class="px-4 py-2 bg-white hover:bg-slate-50 border border-slate-200 text-slate-700 rounded-xl text-sm font-medium flex items-center gap-1.5 shadow-sm">
        + 10행 추가
      </button>
      
      <button onclick="init100Rows()" 
              class="px-4 py-2 bg-white hover:bg-slate-50 border border-slate-200 text-slate-700 rounded-xl text-sm font-medium flex items-center gap-1.5 shadow-sm">
        100행 초기화
      </button>

      <button onclick="clearAllRows()" 
              class="px-4 py-2 bg-white hover:bg-red-50 border border-red-200 text-red-600 rounded-xl text-sm font-medium flex items-center gap-1.5 shadow-sm">
        전체 초기화
      </button>

      <div class="flex-1"></div>

      <button onclick="downloadExcelTemplate()" 
              class="px-4 py-2 bg-white border border-[#276EF1] text-[#276EF1] hover:bg-blue-50 rounded-xl text-sm font-semibold flex items-center gap-1.5 shadow-sm">
        📋 업로드 양식
      </button>

      <button onclick="uploadExcelFile()" 
              class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl text-sm font-semibold flex items-center gap-1.5 shadow-sm">
        📤 엑셀 업로드
      </button>

      <input type="text" id="searchInput" placeholder="검색..." 
             oninput="filterTable()"
             class="w-40 px-3 py-2 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-[#276EF1]">

      <button onclick="exportToCSV()" 
              class="px-4 py-1.5 bg-[#276EF1] hover:bg-blue-700 text-white rounded-xl text-sm font-semibold flex flex-col items-center justify-center leading-none shadow-sm w-[78px]">
        <div class="flex items-center gap-1">
          <span>📥</span><span>CSV</span>
        </div>
        <span class="text-[10px] -mt-0.5">내보내기</span>
      </button>
    </div>

    <!-- 테이블 -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full data-table text-sm">
          <thead class="sticky top-0 z-10">
            <tr>
              <th class="w-10 text-center">번호</th>
              <th class="min-w-[130px]">항목</th>
              <th class="min-w-[130px]">배치 번호</th>
              <th class="w-16 text-center">1번 packing</th>
              <th class="w-20 text-center">packing No.</th>
              <th class="min-w-[140px]">비고</th>
              <th class="w-10"></th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>

    <div class="mt-2 text-xs text-slate-500 px-1 flex justify-between">
      <div>총 행 수: <span id="rowCount" class="font-semibold text-slate-700">0</span>행</div>
      <div>데이터는 기기별로 저장됩니다</div>
    </div>
  </div>

  <script>
    let rowIdCounter = 0;

    function createRow(number, data = null) {
      const tr = document.createElement('tr');
      tr.className = 'row-hover border-b border-slate-100';
      tr.dataset.rowId = ++rowIdCounter;

      const itemVal = data ? data.item : '';
      const batchVal = data ? data.desc : '';
      const checked = data ? data.checked : false;
      const numVal = data ? data.num : '';
      const noteVal = data ? data.note : '';

      tr.innerHTML = `
        <td class="text-center font-mono text-slate-500 text-xs">${number}</td>
        <td><input type="text" value="${itemVal}" placeholder="항목"></td>
        <td><input type="text" value="${batchVal}" placeholder="배치 번호"></td>
        <td class="text-center"><input type="checkbox" ${checked ? 'checked' : ''} class="accent-[#276EF1] w-4 h-4"></td>
        <td><input type="number" value="${numVal}" placeholder="0" class="text-center"></td>
        <td><input type="text" value="${noteVal}" placeholder="비고"></td>
        <td class="text-center">
          <button onclick="deleteRow(this)" class="text-red-400 hover:text-red-600 p-1 text-base">🗑️</button>
        </td>
      `;

      const inputs = tr.querySelectorAll('input');
      inputs.forEach(input => {
        input.addEventListener('input', () => { saveToLocalStorage(); showSaveStatus(); });
        input.addEventListener('change', () => { saveToLocalStorage(); showSaveStatus(); });
      });
      return tr;
    }

    function addRows(count) {
      const tbody = document.getElementById('tableBody');
      const current = tbody.querySelectorAll('tr').length;
      for (let i = 0; i < count; i++) {
        tbody.appendChild(createRow(current + i + 1));
      }
      updateRowCount();
      saveToLocalStorage();
    }

    function init100Rows() {
      if (!confirm('100행으로 초기화할까요?')) return;
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';
      rowIdCounter = 0;
      for (let i = 1; i <= 100; i++) tbody.appendChild(createRow(i));
      updateRowCount();
      saveToLocalStorage();
    }

    function deleteRow(btn) {
      if (!confirm('삭제할까요?')) return;
      btn.closest('tr').remove();
      renumberRows();
      updateRowCount();
      saveToLocalStorage();
    }

    function renumberRows() {
      document.querySelectorAll('#tableBody tr').forEach((row, i) => {
        row.querySelector('td:first-child').textContent = i + 1;
      });
    }

    function updateRowCount() {
      document.getElementById('rowCount').textContent = document.getElementById('tableBody').querySelectorAll('tr').length;
    }

    function filterTable() {
      const term = document.getElementById('searchInput').value.toLowerCase();
      document.querySelectorAll('#tableBody tr').forEach(row => {
        row.style.display = row.textContent.toLowerCase().includes(term) ? '' : 'none';
      });
    }

    function saveToLocalStorage() {
      const rows = document.getElementById('tableBody').querySelectorAll('tr');
      const data = [];
      rows.forEach(row => {
        const inputs = row.querySelectorAll('input');
        data.push({
          item: inputs[0].value,
          desc: inputs[1].value,
          checked: inputs[2].checked,
          num: inputs[3].value,
          note: inputs[4].value
        });
      });
      localStorage.setItem('kolmarSheetData', JSON.stringify(data));
    }

    function loadFromLocalStorage() {
      const saved = localStorage.getItem('kolmarSheetData');
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';
      rowIdCounter = 0;

      if (saved) {
        JSON.parse(saved).forEach((d, i) => tbody.appendChild(createRow(i + 1, d)));
      } else {
        for (let i = 1; i <= 10; i++) tbody.appendChild(createRow(i));
      }
      updateRowCount();
    }

    function clearAllRows() {
      if (!confirm('전체 초기화할까요?')) return;
      localStorage.removeItem('kolmarSheetData');
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';
      rowIdCounter = 0;
      for (let i = 1; i <= 10; i++) tbody.appendChild(createRow(i));
      updateRowCount();
    }

    function downloadExcelTemplate() {
      const ws_data = [["번호", "항목", "배치 번호"]];
      for (let i = 1; i <= 100; i++) ws_data.push([i, "", ""]);

      const ws = XLSX.utils.aoa_to_sheet(ws_data);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "업로드 양식");

      const headerStyle = { font: { bold: true, color: { rgb: "FFFFFF" } }, fill: { fgColor: { rgb: "276EF1" } } };
      ws['A1'].s = headerStyle; ws['B1'].s = headerStyle; ws['C1'].s = headerStyle;

      XLSX.writeFile(wb, "KOLMAR_업로드_양식.xlsx");
    }

    function uploadExcelFile() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.xlsx,.xls,.csv';
      input.onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        rowIdCounter = 0;

        if (file.name.toLowerCase().endsWith('.csv')) {
          const reader = new FileReader();
          reader.onload = ev => parseAndFill(ev.target.result, tbody, true);
          reader.readAsText(file, 'UTF-8');
        } else {
          const reader = new FileReader();
          reader.onload = ev => {
            const data = new Uint8Array(ev.target.result);
            const wb = XLSX.read(data, { type: 'array' });
            const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });
            parseAndFill(json, tbody, false);
          };
          reader.readAsArrayBuffer(file);
        }
      };
      input.click();
    }

    function parseAndFill(data, tbody, isCSV) {
      let rows = isCSV 
        ? data.trim().split(/\r?\n/).map(l => l.split(',').map(v => v.trim().replace(/^"|"$/g,'')))
        : data;

      if (rows.length < 2) { alert("데이터가 없습니다."); loadFromLocalStorage(); return; }

      const headers = rows[0].map(h => String(h || '').trim().toLowerCase());
      let itemCol = -1, batchCol = -1;
      headers.forEach((h, idx) => {
        if (h.includes('항목')) itemCol = idx;
        if (h.includes('배치')) batchCol = idx;
      });

      if (itemCol === -1) { alert("'항목' 컬럼을 찾을 수 없습니다."); loadFromLocalStorage(); return; }

      const max = Math.min(100, rows.length - 1);
      for (let i = 1; i <= max; i++) {
        const r = rows[i] || [];
        tbody.appendChild(createRow(i, {
          item: r[itemCol] || '',
          desc: batchCol !== -1 ? (r[batchCol] || '') : '',
          checked: false, num: '', note: ''
        }));
      }
      updateRowCount();
      saveToLocalStorage();
    }

    function exportToCSV() {
      const rows = document.getElementById('tableBody').querySelectorAll('tr');
      let csv = '\uFEFF번호,항목,배치 번호,1번 packing,packing No.,비고\n';

      rows.forEach(row => {
        const inputs = row.querySelectorAll('input');
        const no = row.querySelector('td:first-child').textContent;
        const item = inputs[0].value.replace(/"/g, '""');
        const batch = inputs[1].value.replace(/"/g, '""');
        const packing = inputs[2].checked ? '1' : '';
        const num = inputs[3].value;
        const note = inputs[4].value.replace(/"/g, '""');
        csv += `${no},"${item}","${batch}",${packing},${num},"${note}"\n`;
      });

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'kolmar_data.csv';
      a.click();
    }

    function showSaveStatus() {
      // 간단한 저장 표시 (필요시 추가 가능)
    }

    function init() {
      loadFromLocalStorage();
      document.getElementById('searchInput').addEventListener('keypress', e => {
        if (e.key === 'Enter') e.preventDefault();
      });
    }
    window.onload = init;
  </script>
</body>
</html>
